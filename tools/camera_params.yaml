# -------------------------------------------------------------------------
# SpaceDrive — Default camera parameters (NuScenes reference values)
# -------------------------------------------------------------------------
# Raw calibration copied from calibrated_sensor.json + sensor.json.
#
# sensor2ego_rotation    : quaternion [w, x, y, z]  (cam → ego / lidar)
# sensor2ego_translation : [x, y, z] metres         (cam → ego / lidar)
# camera_intrinsic       : 3×3 intrinsic matrix (row-major)
#
# The inference script converts these into 4×4 viewpad (intrinsic) and
# lidar2cam (extrinsic) exactly like nuscenes_dataset.py does:
#   cam2lidar_rt  = convert_egopose_to_matrix(R, t)
#   lidar2cam_rt  = invert_matrix(cam2lidar_rt)
#   viewpad       = eye(4);  viewpad[:3,:3] = camera_intrinsic
# -------------------------------------------------------------------------

